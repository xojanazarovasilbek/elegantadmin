{% extends 'base.html' %}
{% block content %}

<div style="max-width: 550px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-family: 'Segoe UI', sans-serif;">
    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 25px;">📚 {{ title }}</h2>

    <form method="post">
        {% csrf_token %}

        <div style="margin-bottom: 18px;">
            <label style="display:block; font-weight:600; margin-bottom:8px;">Guruh nomi:</label>
            <input type="text" name="name" required placeholder="Masalan: Matematika-1A"
                   style="width:100%; padding:12px; border:2px solid #eee; border-radius:8px; font-size:15px;">
        </div>

        <div style="margin-bottom: 18px;">
            <label style="display:block; font-weight:600; margin-bottom:8px;">Ustoz:</label>
            <select name="teacher"
                    style="width:100%; padding:12px; border:2px solid #eee; border-radius:8px; font-size:15px;">
                <option value="">— Tanlanmagan —</option>
                {% for t in teachers %}
                <option value="{{ t.id }}">{{ t.user.get_full_name|default:t.user.username }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; font-weight:600; margin-bottom:8px;">Kurs narxi (so'm):</label>
            <input type="number" name="price" required min="0" step="0.01"
                   style="width:100%; padding:12px; border:2px solid #eee; border-radius:8px; font-size:15px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; font-weight:600; margin-bottom:10px;">🖐️ Dars kunlari:</label>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                {% for code, label in weekdays %}
                <label style="display:flex; align-items:center; gap:6px; background:#f8f9fa; padding:8px 10px; border-radius:8px; font-size:13px; cursor:pointer;">
                    <input type="checkbox" name="days" value="{{ code }}">
                    {{ label|slice:":3" }}
                </label>
                {% endfor %}
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-bottom: 22px;">
            <div style="flex: 1;">
                <label style="display:block; font-weight:600; margin-bottom:8px;">Boshlanish vaqti:</label>
                <input type="time" name="start_time"
                       style="width:100%; padding:12px; border:2px solid #eee; border-radius:8px; font-size:15px;">
            </div>
            <div style="flex: 1;">
                <label style="display:block; font-weight:600; margin-bottom:8px;">Tugash vaqti:</label>
                <input type="time" name="end_time"
                       style="width:100%; padding:12px; border:2px solid #eee; border-radius:8px; font-size:15px;">
            </div>
        </div>

        <button type="submit" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:8px; font-size:17px; font-weight:bold; cursor:pointer;">
            💾 Saqlash
        </button>

        <a href="{% url 'group_list' %}" style="display:block; text-align:center; margin-top:15px; color:#7f8c8d; text-decoration:none; font-size:14px;">Bekor qilish</a>
    </form>
</div>

{% endblock %}
